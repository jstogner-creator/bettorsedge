<!doctype html>
<html lang="en">
  <head>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var errDiv = document.createElement('div');
        errDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;padding:20px;z-index:9999;font-family:monospace;white-space:pre-wrap;';
        errDiv.innerHTML = '<b>Startup Error:</b><br>' + message + '<br>' + source + ':' + lineno + ':' + colno + '<br>' + (error ? error.stack : '');
        document.body.appendChild(errDiv);
      };
      window.onunhandledrejection = function(event) {
        var errDiv = document.createElement('div');
        errDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;background:orange;color:white;padding:20px;z-index:9998;font-family:monospace;white-space:pre-wrap;';
        errDiv.innerHTML = '<b>Unhandled Promise Rejection:</b><br>' + (event.reason ? (event.reason.stack || event.reason) : 'Unknown reason');
        document.body.appendChild(errDiv);
      };
    </script>
